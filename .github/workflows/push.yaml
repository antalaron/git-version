name: Tests

on: [push, pull_request]

jobs:
    php-cs-fixer:
        name: Coding Standard
        runs-on: ubuntu-latest
        steps:
            -
                uses: actions/checkout@master
            -
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.1'
                    extensions: intl, mbstring
            -
                run: |
                  mkdir -p tools/php-cs-fixer
                  composer require --dev --working-dir=tools/php-cs-fixer friendsofphp/php-cs-fixer:3.64.0
                  tools/php-cs-fixer/vendor/bin/php-cs-fixer fix --diff --dry-run -vvv --config=.php-cs-fixer.dist.php --show-progress=none

    test:
        name: Test on PHP ${{ matrix.php-versions }}, dependencies ${{ matrix.dependencies }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php-versions: ['5.5', '8.4']
                dependencies: ['lowest', 'highest']

        steps:
            -
                uses: actions/checkout@v4

            -
                name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-versions }}
                    coverage: none

            -
                name: Install Composer Dependencies
                uses: ramsey/composer-install@v3
                with:
                    dependency-versions: "${{ matrix.dependencies }}"

            -   name: Run phpunit
                run: vendor/bin/phpunit --verbose
